site:
  name: Hakan Çelik
  site: 'https://hakancelik.dev'
  base: '/'
  trailingSlash: false

# Default SEO metadata
metadata:
  title:
    default: Hakan Çelik
    template: '%s — Hakan Çelik'
  description: "Hakan Çelik — Software Engineer. Python araçları, iOS/macOS uygulamaları ve yazılım üzerine yazılar."
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Hakan Çelik
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@hakancelikdev'
    site: '@hakancelikdev'
    cardType: summary_large_image

i18n:
  language: tr
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 9

    post:
      isEnabled: true
      permalink: '/%slug%'
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog'
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: 'G-2EGM5WWEED'

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
